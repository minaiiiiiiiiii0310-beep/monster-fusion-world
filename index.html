<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- 基本メタ -->
  <title>モンスター・スナップ — 3レーン カードバトル Webゲーム</title>
  <meta name="description" content="157体の モンスターを 使った 3レーン × 6ターン の カードバトル。シンプルなのに 奥深い 戦略 ゲーム。スマホで サクッと 遊べる。">
  <meta name="author" content="minaiiiiiiiiii0310-beep">
  <meta name="theme-color" content="#10131c">

  <!-- PWA / ホーム画面追加 -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="モンスター・スナップ">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- OGP / Twitter Card -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="モンスター・スナップ — 3レーン カードバトル">
  <meta property="og:description" content="157体の モンスターで 3レーン × 6ターン の カードバトル。シンプルなのに 奥深い。スマホで サクッと。">
  <meta property="og:image" content="icon.svg">
  <meta property="og:url" content="https://minaiiiiiiiiii0310-beep.github.io/monster-fusion-world/">
  <meta property="og:locale" content="ja_JP">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="モンスター・スナップ">
  <meta name="twitter:description" content="3レーン カードバトル Webゲーム">
  <meta name="twitter:image" content="icon.svg">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/snap.css">
</head>
<body>
  <!-- スプラッシュ：JS 読み込み完了まで表示 -->
  <div id="splash" class="splash" aria-hidden="true">
    <div class="splash-inner">
      <div class="splash-logo" aria-hidden="true">
        <img src="icon.svg" alt="" width="120" height="120">
      </div>
      <div class="splash-title">モンスター・スナップ</div>
      <div class="splash-sub">3レーン × 6ターン カードバトル</div>
      <div class="splash-spinner"></div>
      <div class="splash-tip">ロード中…</div>
    </div>
  </div>

  <div id="app">
    <div id="screen"></div>
  </div>
  <div class="rotate-hint">📱 スマホは 縦持ち推奨</div>
  <button id="mute-btn" class="mute-btn" data-act="mute" title="音のオン/オフ" aria-label="音のオン/オフ">🔊</button>

  <!-- Service Worker 登録（PWA: オフライン対応＋インストール可） -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch((e) => console.warn('SW registration failed', e));
      });
    }
    // グローバルエラーハンドラ
    window.addEventListener('error', (e) => {
      console.error('[GameError]', e.message, e.error);
      try { document.getElementById('splash')?.classList.add('done'); } catch (x) {}
    });
    window.addEventListener('unhandledrejection', (e) => {
      console.error('[GamePromiseError]', e.reason);
    });
  </script>

  <!-- Snap 専用ゲームの スクリプト -->
  <script src="js/firebase-config.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/art.js"></script>
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/online.js"></script>
  <script src="js/snap_data.js"></script>
  <script src="js/snap_locations.js"></script>
  <script src="js/snap_engine.js"></script>
  <script src="js/snap_cpu.js"></script>
  <script src="js/snap_ui.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
